name: Hedgehog Sentinel Solo EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install
      run: pip install PyQt6 PyQt6-WebEngine pyinstaller
    - name: Create OneFile EXE
      run: |
        # --onefile: Her şeyi tek bir .exe yapar
        # --collect-all: Eksik DLL kalmamasını garanti eder
        pyinstaller --onefile --windowed --collect-all PyQt6 --collect-all PyQt6_WebEngine --name "Hedgehog_Sentinel" main.py
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Hedgehog_Solo_EXE
        path: dist/Hedgehog_Sentinel.exe
