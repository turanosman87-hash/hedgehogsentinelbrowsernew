name: Hedgehog Final Build

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Install
      run: pip install PyQt5 PyQtWebEngine pyinstaller
    - name: Build EXE Package
      run: |
        # --onedir: Tüm DLL'leri yanına koyar, "bulunamadı" hatasını bitirir
        pyinstaller --onedir --windowed --noconfirm --name "Hedgehog_Sentinel" main.py
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Hedgehog_Sentinel_Windows_Final
        path: dist/Hedgehog_Sentinel/
