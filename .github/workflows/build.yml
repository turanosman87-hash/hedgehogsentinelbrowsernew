name: Hedgehog Classic Build

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9' # Daha kararlı bir sürüm
    - name: Install PyQt5
      run: pip install PyQt5 PyQtWebEngine pyinstaller
    - name: Build Standalone EXE
      run: |
        # PyQt5 ile DLL hatası ihtimali çok düşüktür
        pyinstaller --onefile --windowed --name "Hedgehog_Sentinel" main.py
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Hedgehog_Sentinel_Classic
        path: dist/Hedgehog_Sentinel.exe
